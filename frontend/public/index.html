<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8" />
    <meta name="author" content="Aditya Shukla" />
    <meta
      name="description"
      content="Welcome to Aditya Shukla's personal portfolio website. B.Tech IT student at IIIT-Bhubaneswar. Full Stack Developer & Competitive Programmer skilled in MERN stack, Python, FastAPI, and C++."
    />
    <meta
      name="keywords"
      content="Aditya Shukla, Aspiring Software Engineer, Personal Portfolio, Full Stack Developer, Competitive Programmer, MERN Stack, React, Node.js, MongoDB, C++, Python, FastAPI, IIIT-Bhubaneswar, LeetCode, Data Structures, Algorithms, Web Development"
    />
    <meta name="theme-color" content="#fcbc1d" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Aditya Shukla | Portfolio" />
    <meta
      property="og:description"
      content="Explore Aditya Shukla's portfolio — B.Tech IT at IIIT-Bhubaneswar. Projects built with MERN stack, Python, FastAPI, and C++."
    />
    <meta property="og:image" content="../src/assets/img/media/Aditya.webp" />
    <meta property="og:url" content="https://aditya-shukla.dev" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aditya Shukla | Portfolio" />
    <meta
      name="twitter:description"
      content="Explore Aditya Shukla's journey — B.Tech IT at IIIT-Bhubaneswar, Full Stack Developer and Competitive Programmer with MERN, Python, FastAPI, and C++."
    />
    <meta name="twitter:image" content="URL_to_your_image.jpg" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon-as.svg" />
    <link rel="website icon" href="./favicon.ico" />
    <!-- Preload LCP and critical above-the-fold / scroll assets -->
    <link
      rel="preload"
      as="image"
      href="%PUBLIC_URL%/home-bg.webp"
      fetchpriority="high"
    />
    <link rel="preload" as="image" href="%PUBLIC_URL%/Aditya.webp" />
    <link
      rel="preload"
      as="image"
      href="%PUBLIC_URL%/Aditya-Profile-Photo.webp"
    />
    <link rel="preload" as="image" href="%PUBLIC_URL%/contact-bg.webp" />
    <!-- Fonts loaded via CSS from src/assets/font (webpack bundles them; no HTML preload) -->
    <!-- Primary Font Awesome: render-blocking for first paint -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/Aditya-Profile-Photo.webp" />
    <!-- Font Awesome 4.7 and 6: load async so first paint isn't blocked -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
      media="print"
      onload="this.media = 'all'"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <!-- <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    /> -->
    <!-- Calendly badge widget end -->
    <title>Aditya Shukla | Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
